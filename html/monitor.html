<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>360 Monitor</title>
  <style>
    body { margin:0; background:#05060a; color:#eee; font-family:system-ui; }
    .grid {
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 33vh);
      gap:4px;
      padding:4px;
    }
    .cell {
      border:1px solid #333;
      padding:6px;
      box-sizing:border-box;
      font-size:12px;
      overflow:auto;
      background:#0b0d12;
    }
    .title { font-weight:bold; margin-bottom:4px; color:#7cf; }
  </style>
</head>
<body>
  <div class="grid">
    <div class="cell">
      <div class="title">RUN8 / SAT</div>
      <iframe src="https://iki1uc.github.io/RUN8" width="100%" height="100%" frameborder="0"></iframe>
    </div>
    <div class="cell">
      <div class="title">XARG / VISIO</div>
      <iframe src="https://iki1uc.github.io/XARG" width="100%" height="100%" frameborder="0"></iframe>
    </div>
    <div class="cell">
      <div class="title">ARG / Instanz</div>
      <iframe src="https://iki1uc.github.io/ARG" width="100%" height="100%" frameborder="0"></iframe>
    </div>
    <div class="cell">
      <div class="title">SEC / PRIM</div>
      <iframe src="https://iki1uc.github.io/SEC/index.html" width="100%" height="100%" frameborder="0"></iframe>
    </div>
    <div class="cell">
      <div class="title">dil.siz.ler</div>
      <iframe src="https://iki1uc.github.io/dil.siz.ler" width="100%" height="100%" frameborder="0"></iframe>
    </div>
    <div class="cell">
      <div class="title">RAW / MASS</div>
      <iframe src="https://iki1uc.github.io/XARG/index.RAW.html" width="100%" height="100%" frameborder="0"></iframe>
    </div>
    <div class="cell">
      <div class="title">RESPO‑Scanner</div>
      <!-- hier später eigenes JS‑Panel -->
    </div>
    <div class="cell">
      <div class="title">SAT‑Monitor</div>
      <!-- hier später SAT‑Status aus RUN8 -->
    </div>
    <div class="cell">
      <div class="title">LOG / EVO</div>
      <!-- hier später EVO‑Status / Instanz‑Log -->
    </div>
  </div>
</body>
</html>
